<script>
(function() {
    // ===== Right Sidebar Resize =====
    function initSidebarResize() {
        const sidebar = document.querySelector('.right-sidebar');
        if (!sidebar) return;

        // Don't add resize on mobile (sidebar is hidden)
        const lgBreakpoint = 1024;
        if (window.innerWidth < lgBreakpoint) return;

        // Create resize handle
        const handle = document.createElement('div');
        handle.className = 'sidebar-resize-handle';
        sidebar.prepend(handle);

        const STORAGE_KEY = 'right-sidebar-width';
        const MIN_WIDTH = 200;
        const MAX_WIDTH = 600;

        // Restore saved width
        const savedWidth = localStorage.getItem(STORAGE_KEY);
        if (savedWidth) {
            sidebar.style.setProperty('--right-sidebar-custom-width', savedWidth + 'px');
        }

        let isResizing = false;
        let startX = 0;
        let startWidth = 0;

        handle.addEventListener('mousedown', function(e) {
            e.preventDefault();
            isResizing = true;
            startX = e.clientX;
            startWidth = sidebar.offsetWidth;
            handle.classList.add('active');
            document.body.classList.add('sidebar-resizing');
        });

        document.addEventListener('mousemove', function(e) {
            if (!isResizing) return;

            const deltaX = startX - e.clientX;
            let newWidth = startWidth + deltaX;

            // Clamp width
            newWidth = Math.max(MIN_WIDTH, Math.min(MAX_WIDTH, newWidth));

            sidebar.style.setProperty('--right-sidebar-custom-width', newWidth + 'px');
        });

        document.addEventListener('mouseup', function() {
            if (!isResizing) return;
            isResizing = false;
            handle.classList.remove('active');
            document.body.classList.remove('sidebar-resizing');

            // Save to localStorage
            const currentWidth = sidebar.offsetWidth;
            localStorage.setItem(STORAGE_KEY, currentWidth);
        });

        // Handle window resize — remove handle on mobile
        window.addEventListener('resize', function() {
            if (window.innerWidth < lgBreakpoint) {
                handle.style.display = 'none';
            } else {
                handle.style.display = '';
            }
        });
    }

    // Run after DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initSidebarResize);
    } else {
        initSidebarResize();
    }
})();
</script>
